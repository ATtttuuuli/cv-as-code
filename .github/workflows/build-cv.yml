name: Build CV PDF

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-pdf:
    name: Compile Markdown → PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            fonts-liberation

      - name: Install WeasyPrint
        run: pip install weasyprint==62.3

      - name: Build PDF
        run: make build-local

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-ali-benali
          path: dist/cv-ali-benali.pdf
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cv-ali-benali.pdf
