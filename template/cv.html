<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$name$ — CV</title>
<link rel="stylesheet" href="../styles/cv.css" />
  $for(css)$
  <link rel="stylesheet" href="$css$">
  $endfor$
</head>
<body>
  <header class="cv-header">
    <div class="cv-header__identity">
      <h1 class="cv-name">$name$</h1>
      <p class="cv-title">$title$</p>
    </div>
    <nav class="cv-header__contact">
      <span>$email$</span>
      <span>$phone$</span>
      <span>$location$</span>
      <span>$github$</span>
      <span>$linkedin$</span>
    </nav>
  </header>

  <main class="cv-body">
$body$
  </main>
</body>
</html>
